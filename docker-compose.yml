services:
  redis:
    image: redis:8.0
    container_name: video_dubbing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
  api:
    build: .
    container_name: video_dubbing_api
    command: bash ./scripts/start.sh
    depends_on:
      - redis
    ports:
      - "8000:8000"      # 根据应用需要调整端口
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
      - ./.env.prod:/app/.env
    restart: unless-stopped
    # deploy:
